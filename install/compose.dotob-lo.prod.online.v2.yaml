services:
  docker-socket-proxy-ro:
    image: tecnativa/docker-socket-proxy:v0.4.1
    container_name: dotoblo_docker_socket_proxy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - INFO=1
      - PING=1
      - EVENTS=1
    networks:
      - core-internal

  docker-socket-proxy-admin:
    image: tecnativa/docker-socket-proxy:v0.4.1
    container_name: dotoblo_docker_socket_proxy_admin
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - INFO=1
      - POST=1
      - DELETE=1
    networks:
      - core-internal

  registry:
    image: registry:2
    container_name: dotoblo_registry
    restart: unless-stopped
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/registry:/var/lib/registry
    ports:
      - "127.0.0.1:5001:5000"
    networks:
      - core-internal

  admin:
    image: ghcr.io/ddai86/dotob-lo-admin@sha256:8442e911e74e6edb60ee4750cd6a8b310d2ecffd3cea19b4f7b79c6f985ae190
    container_name: dotoblo_admin
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8080:8080"
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage:/app/storage
    environment:
      - NODE_ENV=${DOTOB_NODE_ENV:-production}
      - DOTOB_COOKIE_SECURE=${DOTOB_COOKIE_SECURE:-true}
      - PORT=8080
      - HOST=0.0.0.0
      - URL=http://SERVER_IP_OR_DOMAIN:8080
      - LOG_LEVEL=info
      - APP_KEY=REPLACE_ME_>=16CHARS
      - DOTOB_STRICT_SECRETS=true
      - APP_VERSION_OVERRIDE=1.0
      - BRAND_INTEGRITY_ENFORCE=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=REPLACE_ME
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage
      - NOMAD_UPDATE_SERVICE_BINDS=true
      - NOMAD_DOCKER_NETWORK=dotob-lo_default
      - NOMAD_INFRA_PREFIX=nomad_
      - DOTOB_RUN_WORKER=false
      - DOTOB_RUN_MIGRATIONS=false
      - DOTOB_RUN_SEEDS=false
      - DOTOB_DOCKER_HOST=http://docker-socket-proxy-admin:2375
      - DOTOB_APP_CATALOG_DIR=/app/storage/app-catalog
      - DOTOB_LOCAL_REGISTRY_HOST=registry:5000
      - DOTOB_PREFER_LOCAL_REGISTRY=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy-admin:
        condition: service_started
      registry:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    networks:
      - edge
      - core-internal
      - apps
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ghcr.io/ddai86/dotob-lo-admin@sha256:8442e911e74e6edb60ee4750cd6a8b310d2ecffd3cea19b4f7b79c6f985ae190
    container_name: dotoblo_worker
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage:/app/storage
    environment:
      - NODE_ENV=${DOTOB_NODE_ENV:-production}
      - LOG_LEVEL=info
      - APP_KEY=REPLACE_ME_>=16CHARS
      - DOTOB_STRICT_SECRETS=true
      - BRAND_INTEGRITY_ENFORCE=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=REPLACE_ME
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage
      - NOMAD_UPDATE_SERVICE_BINDS=true
      - NOMAD_DOCKER_NETWORK=dotob-lo_default
      - NOMAD_INFRA_PREFIX=nomad_
      - DOTOB_ROLE=worker
      - DOTOB_RUN_MIGRATIONS=false
      - DOTOB_RUN_SEEDS=false
      - DOTOB_DOCKER_HOST=http://docker-socket-proxy-admin:2375
      - DOTOB_APP_CATALOG_DIR=/app/storage/app-catalog
      - DOTOB_LOCAL_REGISTRY_HOST=registry:5000
      - DOTOB_PREFER_LOCAL_REGISTRY=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy-admin:
        condition: service_started
      registry:
        condition: service_started
      migrator:
        condition: service_completed_successfully

  migrator:
    image: ghcr.io/ddai86/dotob-lo-admin@sha256:8442e911e74e6edb60ee4750cd6a8b310d2ecffd3cea19b4f7b79c6f985ae190
    container_name: dotoblo_migrator
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage:/app/storage
    environment:
      - NODE_ENV=${DOTOB_NODE_ENV:-production}
      - DOTOB_COOKIE_SECURE=${DOTOB_COOKIE_SECURE:-true}
      - PORT=8080
      - HOST=0.0.0.0
      - URL=http://SERVER_IP_OR_DOMAIN:8080
      - LOG_LEVEL=info
      - APP_KEY=REPLACE_ME_>=16CHARS
      - DOTOB_STRICT_SECRETS=true
      - APP_VERSION_OVERRIDE=1.0
      - BRAND_INTEGRITY_ENFORCE=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=REPLACE_ME
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage
      - NOMAD_UPDATE_SERVICE_BINDS=true
      - NOMAD_DOCKER_NETWORK=dotob-lo_default
      - NOMAD_INFRA_PREFIX=nomad_
      - DOTOB_ROLE=migrate
      - DOTOB_RUN_WORKER=false
      - DOTOB_RUN_MIGRATIONS=true
      - DOTOB_RUN_SEEDS=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - core-internal
      - apps

  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=REPLACE_ME
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=REPLACE_ME
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/mysql:/var/lib/mysql
    networks:
      - core-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/redis:/data
    networks:
      - core-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  edge:
    name: dotob-lo_edge
  core-internal:
    name: dotob-lo_core_internal
    internal: true
  apps:
    name: dotob-lo_default
    internal: true
