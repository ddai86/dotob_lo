services:
  docker-socket-proxy-ro:
    image: tecnativa/docker-socket-proxy:v0.4.1
    container_name: dotoblo_docker_socket_proxy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - INFO=1
      - VERSION=1
      - PING=1
      - EVENTS=1
    networks:
      - core-internal

  docker-socket-proxy-admin:
    image: tecnativa/docker-socket-proxy:v0.4.1
    container_name: dotoblo_docker_socket_proxy_admin
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - INFO=1
      - POST=1
      - DELETE=1
    networks:
      - core-internal

  docker-api-compat:
    image: nginx:1.27-alpine
    container_name: dotoblo_docker_api_compat
    restart: unless-stopped
    volumes:
      - ./traefik/docker_api_compat.nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      docker-socket-proxy-ro:
        condition: service_started
    networks:
      - core-internal

  gateway:
    image: traefik:v3.1
    container_name: dotoblo_gateway
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=tcp://docker-api-compat:2375
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    environment:
      - DOCKER_API_VERSION=${DOTOB_DOCKER_API_VERSION:-1.40}
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    ports:
      - "80:80"
    depends_on:
      docker-api-compat:
        condition: service_started
    networks:
      - edge
      - core-internal
      - apps

  registry:
    image: registry:2
    container_name: dotoblo_registry
    restart: unless-stopped
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/registry:/var/lib/registry
    ports:
      - "127.0.0.1:5001:5000"
    networks:
      - core-internal

  admin:
    image: ${DOTOB_ADMIN_IMAGE:-ghcr.io/ddai86/dotob-lo-admin:latest}
    container_name: dotoblo_admin
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage:/app/storage
    environment:
      - NODE_ENV=${DOTOB_NODE_ENV:-production}
      - DOTOB_COOKIE_SECURE=false
      - PORT=8080
      - HOST=0.0.0.0
      - URL=${DOTOB_PUBLIC_URL:-http://SERVER_IP_OR_DOMAIN}
      - LOG_LEVEL=info
      - APP_KEY=${APP_KEY}
      - DOTOB_STRICT_SECRETS=true
      - DOTOB_RUN_MIGRATIONS=false
      - DOTOB_RUN_SEEDS=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage
      - NOMAD_UPDATE_SERVICE_BINDS=true
      - NOMAD_DOCKER_NETWORK=dotob-lo_default
      - NOMAD_EGRESS_NETWORK=dotob-lo_egress
      - NOMAD_INFRA_PREFIX=nomad_
      - DOTOB_RUN_WORKER=false
      - DOTOB_APP_CATALOG_DIR=/app/app-catalog
      - DOTOB_LOCAL_REGISTRY_HOST=registry:5000
      - DOTOB_DOCKER_HOST=http://docker-socket-proxy-admin:2375
      - DOTOB_DOCKER_API_VERSION=${DOTOB_DOCKER_API_VERSION:-1.40}
      - DOTOB_DOCKER_DNS=${DOTOB_DOCKER_DNS:-1.1.1.1,8.8.8.8}
      - DOTOB_ENABLE_APPS_GATEWAY=true
      - DOTOB_APPS_GATEWAY_URL=${DOTOB_PUBLIC_URL:-http://SERVER_IP_OR_DOMAIN}
      - DOTOB_APPS_GATEWAY_MODE=path
      - DOTOB_APPS_GATEWAY_AUTO_RECONCILE=true
      - DOTOB_APPS_GATEWAY_AUTH_USERS=${DOTOB_APPS_GATEWAY_AUTH_USERS:-}
      - DOTOB_APPS_GATEWAY_TRAEFIK_ENTRYPOINT=web
      - DOTOB_APPS_GATEWAY_TLS=false
      - DOTOB_USE_MANIFEST_CATALOG=true
    depends_on:
      docker-socket-proxy-admin:
        condition: service_started
      registry:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - core-internal
      - apps
      - egress
    labels:
      - traefik.enable=true
      - traefik.docker.network=dotob-lo_edge
      - traefik.http.routers.dotob-admin.rule=PathPrefix(`/`)
      - traefik.http.routers.dotob-admin.entrypoints=web
      - traefik.http.routers.dotob-admin.priority=1
      - traefik.http.routers.dotob-admin.middlewares=dotob-public-chain@file
      - traefik.http.services.dotob-admin.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${DOTOB_ADMIN_IMAGE:-ghcr.io/ddai86/dotob-lo-admin:latest}
    container_name: dotoblo_worker
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage:/app/storage
    environment:
      - NODE_ENV=${DOTOB_NODE_ENV:-production}
      - DOTOB_COOKIE_SECURE=false
      - PORT=8080
      - HOST=0.0.0.0
      - URL=${DOTOB_PUBLIC_URL:-http://SERVER_IP_OR_DOMAIN}
      - LOG_LEVEL=info
      - APP_KEY=${APP_KEY}
      - DOTOB_STRICT_SECRETS=true
      - DOTOB_ROLE=worker
      - DOTOB_RUN_MIGRATIONS=false
      - DOTOB_RUN_SEEDS=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage
      - NOMAD_UPDATE_SERVICE_BINDS=true
      - NOMAD_DOCKER_NETWORK=dotob-lo_default
      - NOMAD_EGRESS_NETWORK=dotob-lo_egress
      - NOMAD_INFRA_PREFIX=nomad_
      - DOTOB_LOCAL_REGISTRY_HOST=registry:5000
      - DOTOB_DOCKER_HOST=http://docker-socket-proxy-admin:2375
      - DOTOB_DOCKER_API_VERSION=${DOTOB_DOCKER_API_VERSION:-1.40}
      - DOTOB_DOCKER_DNS=${DOTOB_DOCKER_DNS:-1.1.1.1,8.8.8.8}
      - DOTOB_ENABLE_APPS_GATEWAY=true
      - DOTOB_APPS_GATEWAY_URL=${DOTOB_PUBLIC_URL:-http://SERVER_IP_OR_DOMAIN}
      - DOTOB_APPS_GATEWAY_MODE=path
      - DOTOB_APPS_GATEWAY_AUTO_RECONCILE=true
      - DOTOB_APPS_GATEWAY_AUTH_USERS=${DOTOB_APPS_GATEWAY_AUTH_USERS:-}
      - DOTOB_APPS_GATEWAY_TRAEFIK_ENTRYPOINT=web
      - DOTOB_APPS_GATEWAY_TLS=false
      - DOTOB_USE_MANIFEST_CATALOG=true
    depends_on:
      docker-socket-proxy-admin:
        condition: service_started
      registry:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - core-internal
      - apps
      - egress

  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - core-internal

  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - core-internal

networks:
  edge:
    name: dotob-lo_edge
  core-internal:
    name: dotob-lo_core_internal
    internal: true
  apps:
    name: dotob-lo_apps
    internal: true
  egress:
    name: dotob-lo_egress

