services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: dotoblo_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - dotob_prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      cadvisor:
        condition: service_started
      node-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      mysqld-exporter:
        condition: service_started
    networks:
      - edge
      - core-internal

  grafana:
    image: grafana/grafana-oss:11.1.4
    container_name: dotoblo_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${DOTOB_GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${DOTOB_GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - dotob_grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - edge
      - core-internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dotoblo_cadvisor
    restart: unless-stopped
    command:
      - --docker=tcp://dotoblo_docker_socket_proxy:2375
      - --prometheus_endpoint=/metrics
      - --disable_metrics=tcp,udp
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8082:8080"
    networks:
      - edge
      - core-internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: dotoblo_node_exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - edge
      - core-internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: dotoblo_redis_exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - edge
      - core-internal

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: dotoblo_mysqld_exporter
    restart: unless-stopped
    command:
      - --mysqld.address=${DOTOB_MYSQL_EXPORTER_ADDR:-nomad_mysql:3306}
      - --mysqld.username=${DOTOB_MYSQL_EXPORTER_USER:-nomad_user}
      - --no-collect.slave_status
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${DOTOB_MYSQL_EXPORTER_PASSWORD:-local-dev-password}
    ports:
      - "127.0.0.1:9104:9104"
    networks:
      - edge
      - core-internal

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: dotoblo_alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ${DOTOB_ALERTMANAGER_CONFIG:-./observability/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
      - dotob_alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edge
      - core-internal

networks:
  edge:
    name: dotob-lo_edge
    external: true
  core-internal:
    name: dotob-lo_core_internal
    external: true

volumes:
  dotob_prometheus_data:
  dotob_grafana_data:
  dotob_alertmanager_data:
