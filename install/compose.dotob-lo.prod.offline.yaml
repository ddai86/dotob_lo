services:
  admin:
    image: dotob-lo-admin:1.0
    container_name: dotoblo_admin
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8080:8080"
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=${DOTOB_NODE_ENV:-production}
      - PORT=8080
      - HOST=0.0.0.0
      - URL=${DOTOB_PUBLIC_URL:-http://SERVER_IP_OR_DOMAIN:8080}
      - LOG_LEVEL=info
      - APP_KEY=REPLACE_ME_>=16CHARS
      - APP_VERSION_OVERRIDE=1.0
      - BRAND_INTEGRITY_ENFORCE=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=REPLACE_ME
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/storage
      - NOMAD_UPDATE_SERVICE_BINDS=true
      - NOMAD_DOCKER_NETWORK=dotob-lo_default
      - NOMAD_INFRA_PREFIX=nomad_
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=REPLACE_ME
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=REPLACE_ME
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - ${DOTOB_HOST_DATA_DIR:-/opt/dotob-lo}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  dozzle:
    image: amir20/dozzle:v10.0
    container_name: nomad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  default:
    name: dotob-lo_default
